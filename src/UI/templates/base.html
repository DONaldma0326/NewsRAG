<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewsRAG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <nav class="navbar navbar-expand navbar-dark fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/chat">NewsRAG</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.url.path.startswith('/chat') else '' }}" href="/chat">
            Chat
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.url.path.startswith('/sources') else '' }}" href="/sources">
            Sources
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.url.path.startswith('/dashboard') else '' }}" href="/dashboard">
            Dashboard
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
